<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Jet Predictor</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #00ff00; border-radius: 15px; padding: 20px; display: inline-block; margin-top: 50px; background: rgba(0, 255, 0, 0.05); }
        h1 { color: #00ff00; font-size: 24px; }
        #signal-output { font-size: 48px; font-weight: bold; margin: 20px 0; color: #ffffff; text-shadow: 0 0 10px #00ff00; }
        #prob { color: #888; margin-bottom: 20px; }
        button { background-color: #00ff00; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h1>LUCKY JET ANALYZER</h1>
        <div id="signal-output">0.00x</div>
        <div id="prob">Эҳтимолият: 99.2%</div>
        <button onclick="generateSignal()">🚀 СИГНАЛ ГИРИФТАН</button>
    </div>

    <script>
        function generateSignal() {
            const output = document.getElementById('signal-output');
            const prob = document.getElementById('prob');
            
            // Эффекти таҳлил
            output.innerText = "ТАҲЛИЛ...";
            output.style.color = "#ffcc00";
            
            setTimeout(() => {
                const now = new Date();
                const min = now.getMinutes();
                let result;

                // Алгоритми "2-соата" (ба вақт вобаста аст)
                // Дар дақиқаҳои ҷуфт (0, 2, 4...) сигналҳо баландтар мешаванд
                if (min % 2 === 0) {
                    result = (Math.random() * (4.20 - 1.80) + 1.80).toFixed(2);
                } else {
                    result = (Math.random() * (2.30 - 1.10) + 1.10).toFixed(2);
                }

                output.innerText = result + 'x';
                output.style.color = "#ffffff";
                prob.innerText = 'Синхронизатсия бо ID: 99.2%';
            }, 1200); 
        }
    </script>
</body>
</html>
